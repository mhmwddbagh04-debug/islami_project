flutter_native_splash:


  color: "#202020"
  color_dark: "#202020"
  # platform-specific color. will override general color if active:
  color_android: "#202020"
  color_dark_android: "#202020"
  color_ios: "#202020"
  color_dark_ios: "#202020"
  color_web: "#202020"
  color_dark_web: "#202020"


  image: assets/images/ic_splash.png
  image_dark: assets/images/ic_splash.png
  # platform-specific image. will override general image if active:
  image_android: assets/images/ic_splash.png
  image_dark_android: assets/images/ic_splash.png
  image_ios: assets/images/ic_splash.png
  image_dark_ios: assets/images/ic_splash.png


  branding: assets/images/branding.png
  branding_dark: assets/images/branding.png
  # platform-specific branding. will override general branding if active:
  branding_android: assets/images/branding.png
  branding_dark_android: assets/images/branding.png
  branding_ios: assets/images/branding.png
  branding_dark_ios: assets/images/branding.png



  # The screen orientation can be set in Android with the android_screen_orientation parameter.
  # Valid parameters can be found here:
  # https://developer.android.com/guide/topics/manifest/activity-element#screen
  #android_screen_orientation: sensorLandscape

  # hide notif bar on android. ios already hides it by default.
  # Has no effect in web since web has no notification bar.
  fullscreen: true                # default false
    # if you dont want to hide notif bar, for android just set this to false,
    # but for ios, add this to your flutter main():
  # WidgetsFlutterBinding.ensureInitialized();
  # SystemChrome.setEnabledSystemUIMode(SystemUiMode.manual, overlays: [SystemUiOverlay.bottom, SystemUiOverlay.top], );

  #! extra note for IOS:
  # If you have changed the name(s) of your info.plist file(s), you can specify the filename(s)
  # with the info_plist_files parameter.  Remove only the # characters in the three lines below,
  # do not remove any spaces:
  #info_plist_files:
  #  - 'ios/Runner/Info-Debug.plist'
  #  - 'ios/Runner/Info-Release.plist'

  #========================================================================

  # what we did above won't affect Android 12 and newer at all. they have different
  # handling concept. visit https://developer.android.com/guide/topics/ui/splash-screen

  #! ANDROID 12+ configuration:
  android_12:
    # background color
    color: "#202020"
    color_dark: "#202020"

    image: assets/images/ic_splash.png
    image_dark: assets/images/ic_splash.png

    # center-logo background color
    # icon_background_color_dark: "#eeeeee"

    # branding:
    # The branding image dimensions must be 800x320 px.
    branding: assets/images/branding.png
    branding_dark: assets/images/branding.png